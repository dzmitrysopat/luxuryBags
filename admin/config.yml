backend:
  name: git-gateway
  repo: dzmitrysopat/luxuryBags
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "shop"
    label: "Сумки"
    files:
      - file: "shop.json"
        label: "Товары"
        name: "shop"
        format: "json"
        fields:
          - label: "Сумки"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} - {{fields.price}} BYN"
            fields:
              - { label: "Название", name: "name", widget: "string" }
              - { label: "Цена", name: "price", widget: "number" }
              - { label: "Описание", name: "description", widget: "text", required: false }
              - { label: "Фото 1", name: "image", widget: "image" }
              - { label: "Фото 2", name: "image2", widget: "image", required: false }
              - { label: "Фото 3", name: "image3", widget: "image", required: false }